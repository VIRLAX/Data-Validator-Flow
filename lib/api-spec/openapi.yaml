        omzetTotal: { type: number }
        labaKotorTotal: { type: number }
        totalTransaksi: { type: integer }
        totalPengeluaran: { type: number }
        dataBulanan:
          type: array
          items:
            $ref: "#/components/schemas/GrafikPoint"

    ValidasiKeuanganItem:
      type: object
      required: [kategori, nilaiSistem, nilaiFisik, selisih, status]
      properties:
        kategori: { type: string }
        nilaiSistem: { type: number }
        nilaiFisik: { type: number }
        selisih: { type: number }
        status: { type: string }

    TopBarang:
      type: object
      required: [barangId, barangNama, jumlahTerjual, omzet]
      properties:
        barangId: { type: integer }
        barangNama: { type: string }
        jumlahTerjual: { type: number }
        omzet: { type: number }

    PengeluaranKategori:
      type: object
      required: [kategori, total]
      properties:
