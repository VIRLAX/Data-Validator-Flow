        kategori: { type: string }
        nominal: { type: number }
        catatan: { type: string }

    # ─── TRANSFER / QRIS ─────────────────────────────────────
    Transfer:
      type: object
      required: [id, tanggal, jenis, nominal, createdAt]
      properties:
        id: { type: integer }
        tanggal: { type: string }
        jenis: { type: string }
        nominal: { type: number }
        keterangan: { type: ["string", "null"] }
        buktiFoto: { type: ["string", "null"] }
        createdAt: { type: string }

    TransferInput:
      type: object
      required: [tanggal, jenis, nominal]
      properties:
        tanggal: { type: string }
        jenis: { type: string }
        nominal: { type: number }
        keterangan: { type: string }
        buktiFoto: { type: string }

    # ─── CASH ────────────────────────────────────────────────
    DenominasiItem:
      type: object
      required: [pecahan, jumlahLembar, subtotal]
      properties:
        pecahan: { type: integer }
        jumlahLembar: { type: integer }
        subtotal: { type: integer }

    Cash:
      type: object
      required: [id, tanggal, jenis, denominasi, total, createdAt]
      properties:
        id: { type: integer }
        tanggal: { type: string }
        jenis: { type: string }
        denominasi:
          type: array
          items:
            $ref: "#/components/schemas/DenominasiItem"
        total: { type: number }
        catatan: { type: ["string", "null"] }
        createdAt: { type: string }

    CashInput:
      type: object
      required: [tanggal, jenis, denominasi]
      properties:
        tanggal: { type: string }
        jenis: { type: string }
        denominasi:
          type: array
          items:
            $ref: "#/components/schemas/DenominasiItem"
        catatan: { type: string }

    CashUpdate:
      type: object
      properties:
        tanggal: { type: string }
        jenis: { type: string }
        denominasi:
          type: array
          items:
            $ref: "#/components/schemas/DenominasiItem"
        catatan: { type: string }

    # ─── STOK HARIAN ─────────────────────────────────────────
    StokHarianItem:
      type: object
      required: [barangId, barangNama, stokFisik, stokSistem, selisih]
      properties:
        barangId: { type: integer }
        barangNama: { type: string }
        barangSatuan: { type: string }
