        stokFisik: { type: number }

    StokHarian:
      type: object
      required: [id, tanggal, items, status, createdAt]
      properties:
        id: { type: integer }
        tanggal: { type: string }
        items:
          type: array
          items:
            $ref: "#/components/schemas/StokHarianItem"
        status: { type: string }
        catatan: { type: ["string", "null"] }
        createdAt: { type: string }

    StokHarianInput:
      type: object
      required: [tanggal, items]
      properties:
        tanggal: { type: string }
        items:
          type: array
          items:
            $ref: "#/components/schemas/StokHarianItemInput"
        catatan: { type: string }

    # ─── VALIDASI ────────────────────────────────────────────
    ValidasiStokItem:
      type: object
      required: [barangId, barangNama, stokSistem, stokFisik, selisih, persentaseSelisih, status]
      properties:
        barangId: { type: integer }
        barangNama: { type: string }
        barangSatuan: { type: string }
        stokSistem: { type: number }
        stokFisik: { type: number }
        selisih: { type: number }
        persentaseSelisih: { type: number }
        status: { type: string }

    ValidasiStokResult:
      type: object
      required: [tanggal, statusKeseluruhan, totalBarang, totalValid, totalSelisih, items]
      properties:
        tanggal: { type: string }
